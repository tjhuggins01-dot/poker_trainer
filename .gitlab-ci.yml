stages:
  - verify

.default_node_job:
  image: node:22
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline

lint:
  stage: verify
  extends: .default_node_job
  script:
    - npm run lint

typecheck:
  stage: verify
  extends: .default_node_job
  script:
    - npm run typecheck

build:
  stage: verify
  extends: .default_node_job
  script:
    - npm run build
